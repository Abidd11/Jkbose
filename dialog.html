<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JKBose Helper</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            padding: 16px;
        }

        .dialog {
            max-width: 300px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            padding: 24px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            border: 2px solid #C5CAE8;
        }

        .app-name { 
            text-align: center; 
            font-size: 18px; 
            font-weight: 800; 
            color: #1a202c; 
            margin-bottom: 20px; 
            padding-bottom: 10px;
            border-bottom: 2px solid #C5CAE8;
        }

        .quote-box {
            background: #C5CAE8;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .quote-text { 
            font-size: 14px; 
            font-style: italic; 
            color: #2d3748; 
            line-height: 1.6; 
            font-weight: 700; 
        }

        .support-msg {
            text-align: center;
            font-size: 11px;
            color: #4a5568;
            margin-bottom: 20px;
            font-weight: 600;
            padding: 10px;
            background: #f8fafc;
            border-radius: 12px;
        }

        .close-btn { 
            background: #C5CAE8; 
            color: #1a202c; 
            padding: 12px; 
            border-radius: 16px; 
            border: none; 
            font-size: 13px; 
            font-weight: 800; 
            width: 100%; 
            cursor: pointer; 
        }
    </style>
</head>
<body>
    <div class="dialog" id="dialog">
        <div class="app-name">📚Daily Inspiration</div>
        
        <div class="quote-box">
            <div class="quote-text" id="quote">"Loading..."</div>
        </div>

        <div class="support-msg">
            🚀 Love using JKBose Helper? Help us grow by sharing this app with your classmates!
        </div>

        <button class="close-btn" onclick="handleClose()">Close</button>
    </div>

    <script>
        const quotes = [
            "Success is the sum of small efforts, repeated day in and day out.", "Believe you can and you're halfway there.", "Your limitation—it's only your imagination.", "Push yourself, because no one else is going to do it for you.", "Don't stop when you're tired. Stop when you're done.",
            "Education is the most powerful weapon which you can use to change the world.", "The future depends on what you do today.", "It always seems impossible until it's done.", "Strive for progress, not perfection.", "Opportunities don't happen, you create them.",
            "Don't watch the clock; do what it does. Keep going.", "Keep your face always toward the sunshine—and shadows will fall behind you.", "It does not matter how slowly you go as long as you do not stop.", "Everything you’ve ever wanted is on the other side of fear.", "Success usually comes to those who are too busy to be looking for it.",
            "Hard work beats talent when talent doesn't work hard.", "The secret of getting ahead is getting started.", "Dream big and dare to fail.", "The only way to do great work is to love what you do.", "Focus on being productive instead of busy.",
            "If you look at what you have in life, you'll always have more.", "If you set your goals ridiculously high and it's a failure, you will fail above everyone else's success.", "Life is what happens when you're making other plans.", "Spread love everywhere you go.", "Always remember that you are absolutely unique. Just like everyone else.",

            "Whatever you can do, or dream you can, begin it.", "The only limit to our realization of tomorrow is our doubts of today.", "Act as if what you do makes a difference. It does.", "Believe in yourself and all that you are.", "Turn your wounds into wisdom.",
            "The way to get started is to quit talking and begin doing.", "Your time is limited, so don't waste it living someone else's life.", "If life were predictable it would cease to be life, and be without flavor.", "If you look at what you have in life, you'll always have more.", "Life is what happens when you're making other plans.",
            "Spread love everywhere you go.", "Always remember that you are absolutely unique.", "Don't judge each day by the harvest you reap.", "The best way to predict your future is to invent it.", "Life is really simple, but we insist on making it complicated.",
            "May you live all the days of your life.", "Life itself is the most wonderful fairy tale.", "Do not let what you cannot do interfere with what you can do.", "Whatever you do, do it with all your might.", "Challenges are what make life interesting.",
            "Happiness is not something ready made. It comes from your own actions.", "The only way to find true happiness is to risk being completely cut open.", "Life is a series of natural and spontaneous changes.", "Get busy living or get busy dying.", "You only live once, but if you do it right, once is enough.",

            "Everything has beauty, but not everyone sees it.", "It is during our darkest moments that we must focus to see the light.", "Do not wait; the time will never be 'just right'.", "Whether you think you can or you think you can't, you're right.", "The only source of knowledge is experience.",
            "Life is a gift, and it offers us the privilege of growth.", "Character cannot be developed in ease and quiet.", "Be yourself; everyone else is already taken.", "The purpose of our lives is to be happy.", "Life is short and it is up to you to make it sweet.",
            "To be yourself in a world that is constantly trying to make you something else.", "There is no substitute for hard work.", "Patience, persistence and perspiration make an unbeatable combination.", "Success is liking yourself, liking what you do.", "The secret of success is to do the common thing uncommonly well."
        ];

        document.getElementById('quote').innerText = `"${quotes[Math.floor(Math.random() * quotes.length)]}"`;
        function handleClose() { document.getElementById('dialog').style.display = 'none'; }
    </script>
</body>
</html>
