<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JKBose App Survey</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 16px;
            overflow: hidden;
        }

        /* Modern Modern Minimalist Dialog Framework */
        .dialog {
            max-width: 310px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 28px;
            padding: 24px;
            position: relative;
            box-shadow: 0 20px 50px -12px rgba(79, 70, 229, 0.2);
            border: 2px solid #E2E8F0;
            text-align: center;
            transform-origin: center;
            animation: springIn 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transition: all 0.3s ease;
        }

        @keyframes springIn {
            0% { transform: scale(0.6) translateY(40px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .dialog.exit-animation {
            animation: bounceOut 0.35s cubic-bezier(0.36, -0.07, 0.57, -0.2) forwards;
        }

        @keyframes bounceOut {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.75) translateY(20px); opacity: 0; }
        }

        /* Unique Floating Mascot Wrap Layout */
        .avatar-container {
            width: 80px;
            height: 80px;
            margin: -44px auto 14px;
            position: relative;
            background: #ffffff;
            border-radius: 24px;
            padding: 6px;
            box-shadow: 0 12px 24px -6px rgba(0, 0, 0, 0.1);
            border: 2px solid #E2E8F0;
            transform: rotate(-4deg);
            animation: teddyFloat 4s ease-in-out infinite;
        }

        @keyframes teddyFloat {
            0%, 100% { transform: translateY(0) rotate(-4deg); }
            50% { transform: translateY(-6px) rotate(4deg); }
        }

        .teddy-bear {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .survey-badge {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #4f46e5;
            margin-bottom: 12px;
            display: inline-block;
            background: #EEF2FF;
            padding: 5px 14px;
            border-radius: 12px;
        }

        /* Fresh Content Accent Box Framework */
        .info-card {
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
            padding: 16px;
            border-radius: 20px;
            margin-bottom: 20px;
            text-align: left;
        }

        .info-title {
            font-size: 14px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-desc {
            font-size: 12.5px;
            color: #64748b;
            line-height: 1.5;
            font-weight: 600;
        }

        /* Sleek Button Interactions */
        .action-btn { 
            background: #1e293b;
            color: white; 
            padding: 14px 20px; 
            border-radius: 16px; 
            border: none; 
            font-size: 14px; 
            font-weight: 800; 
            width: 100%; 
            cursor: pointer; 
            margin-bottom: 14px;
            letter-spacing: 0.2px;
            box-shadow: 0 8px 20px -4px rgba(30, 41, 59, 0.3);
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background: #0f172a;
            transform: translateY(-2px);
            box-shadow: 0 12px 24px -4px rgba(30, 41, 59, 0.4);
        }

        .action-btn:active { 
            transform: translateY(1px);
        }

        /* Centered Custom Checkbox Interface */
        .checkbox-wrapper { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            margin-bottom: 14px;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 10px;
            transition: background 0.2s;
            user-select: none;
        }

        .checkbox-wrapper:hover { background: #F1F5F9; }

        .checkbox-wrapper input { 
            width: 15px; 
            height: 15px; 
            cursor: pointer; 
            accent-color: #1e293b; 
            border: 2px solid #94a3b8;
            border-radius: 4px;
        }

        .checkbox-wrapper label { 
            font-size: 11px; 
            color: #64748b; 
            font-weight: 700; 
            cursor: pointer; 
        }

        .close-btn { 
            background: transparent; 
            color: #94a3b8; 
            padding: 6px; 
            border: none; 
            font-size: 12px; 
            font-weight: 700; 
            width: max-content;
            margin: 0 auto;
            cursor: pointer; 
            display: block;
            transition: color 0.2s;
        }

        .close-btn:hover { color: #64748b; }
    </style>
</head>
<body>
    <div class="dialog" id="dialog">
        <!-- Floating Block Mascot Wrap -->
        <div class="avatar-container">
            <img src="https://media1.tenor.com/m/BxibqUT9-I0AAAAd/dudu-flower.gif" alt="Teddy Bear" class="teddy-bear">
        </div>
        
        <!-- Context Header -->
        <div class="survey-badge">Quick Survey ⚡</div>
        
        <!-- Layout Content Grid Info Card -->
        <div class="info-card">
            <div class="info-title">👋 Help Us Improve!</div>
            <div class="info-desc">
                Take a 1-minute survey to share your feedback and help us build better features for you.
            </div>
        </div>

        <!-- CTA Launch Action -->
        <button class="action-btn" onclick="startSurvey()">Start Survey</button>
        


        <button class="close-btn" onclick="handleClose()">Skip</button>
    </div>

    <script>
        function toggleCheckbox(e) {
            const checkbox = document.getElementById('dontShow');
            checkbox.checked = !checkbox.checked;
        }

        function handleClose() { 
            const dialog = document.getElementById('dialog');
            if (document.getElementById('dontShow').checked) {
                localStorage.setItem('dontShowSurveyDialog', 'true');
            }
            
            dialog.classList.add('exit-animation');
            setTimeout(() => {
                dialog.style.display = 'none';
            }, 320);
        }
        
        function startSurvey() { 
            // Replace the URL below with your actual survey link asset
            window.open('https://form.svhrt.com/6a5ba47f8460ea85043e31e5', '_blank'); 
            handleClose();
        }

        if (localStorage.getItem('dontShowSurveyDialog') === 'true') {
            document.getElementById('dialog').style.display = 'none';
        }
    </script>
</body>
</html>
