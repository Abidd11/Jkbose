<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JKBose Updates</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 16px;
        }

        .dialog {
            max-width: 300px;
            width: 100%;
            background: #ffffff;
            border-radius: 36px;
            padding: 24px;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.25);
            border: 3px solid #C5CAE8;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .teddy-bear {
            width: 80px;
            height: 80px;
            margin: -40px auto 10px;
            display: block;
        }

        .app-name { 
            font-size: 20px; 
            font-weight: 800; 
            color: #1a202c; 
            margin-bottom: 16px; 
        }

        .update-box {
            background: #C5CAE8;
            padding: 16px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .update-text { 
            font-size: 13px; 
            color: #2d3748; 
            line-height: 1.6; 
            font-weight: 800; 
        }

        .action-btn { 
            background: #25D366; 
            color: white; 
            padding: 12px; 
            border-radius: 18px; 
            border: none; 
            font-size: 14px; 
            font-weight: 800; 
            width: 100%; 
            cursor: pointer; 
            margin-bottom: 12px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .checkbox-wrapper { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; }
        .checkbox-wrapper label { font-size: 10px; color: #64748b; font-weight: 700; cursor: pointer; }

        .close-btn { 
            background: transparent; 
            color: #94a3b8; 
            padding: 8px; 
            border: none; 
            font-size: 12px; 
            font-weight: 700; 
            width: 100%; 
            cursor: pointer; 
        }
    </style>
</head>
<body>
    <div class="dialog" id="dialog">
        <!-- Animated Teddy Bear -->
        <img src="https://media.tenor.com/63IENW605s0AAAAj/dudu-twisting-dance.gif" alt="Teddy Bear" class="teddy-bear">
        
        <div class="update-box">
            <div class="update-text">
                ✨ 12th English Guess<br>
                ✨ 10th Science Guess<br>
                ✨ 11th Guess Paper<br>
                Available now on WhatsApp!
            </div>
        </div>

        <button class="action-btn" onclick="joinWhatsApp()">Join WhatsApp Now</button>
        
        <div class="checkbox-wrapper">
            <input type="checkbox" id="dontShow">
            <label for="dontShow">Don't show again</label>
        </div>

        <button class="close-btn" onclick="handleClose()">Dismiss</button>
    </div>

    <script>
        function handleClose() { 
            if (document.getElementById('dontShow').checked) {
                localStorage.setItem('dontShowDialog', 'true');
            }
            document.getElementById('dialog').style.display = 'none'; 
        }
        
        function joinWhatsApp() { 
            window.open('https://chat.whatsapp.com/Gvx7OvnZMAILbiYdAwM1wg', '_blank'); 
        }

        if (localStorage.getItem('dontShowDialog') === 'true') {
            document.getElementById('dialog').style.display = 'none';
        }
    </script>
</body>
</html>
