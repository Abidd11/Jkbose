<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JKBose Helper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            padding: 16px;
        }

        /* Small Dialog */
        .dialog {
            max-width: 280px;
            width: 100%;
            background: linear-gradient(135deg, #E6E6F2 0%, #C5CAE8 100%);
            border-radius: 28px;
            padding: 20px 18px;
            position: relative;
            animation: floatIn 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.2);
        }

        /* Entrance Animation */
        @keyframes floatIn {
            0% {
                opacity: 0;
                transform: scale(0.7) translateY(30px);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.02) translateY(-5px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* Close Button */
        .close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 28px;
            height: 28px;
            background: rgba(0, 0, 0, 0.08);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            color: #4a5568;
            transition: all 0.25s ease;
            z-index: 10;
        }

        .close:hover {
            background: rgba(0, 0, 0, 0.15);
            transform: rotate(90deg) scale(1.05);
        }

        /* App Name */
        .app-name {
            text-align: center;
            font-size: 18px;
            font-weight: 800;
            color: #1a202c;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
            animation: slideDown 0.4s ease 0.05s both;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tagline {
            text-align: center;
            font-size: 10px;
            color: #4a5568;
            margin-bottom: 16px;
            animation: fadeIn 0.4s ease 0.1s both;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Resources Grid - 2x3 */
        .resources {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .resource-item {
            background: white;
            border-radius: 16px;
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            animation: cardPop 0.4s cubic-bezier(0.34, 1.2, 0.64, 1) backwards;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
        }

        .resource-item:nth-child(1) { animation-delay: 0.05s; }
        .resource-item:nth-child(2) { animation-delay: 0.1s; }
        .resource-item:nth-child(3) { animation-delay: 0.15s; }
        .resource-item:nth-child(4) { animation-delay: 0.2s; }
        .resource-item:nth-child(5) { animation-delay: 0.25s; }
        .resource-item:nth-child(6) { animation-delay: 0.3s; }

        @keyframes cardPop {
            from {
                opacity: 0;
                transform: scale(0.85);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .resource-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08);
            background: #ffffff;
        }

        .resource-item:active {
            transform: scale(0.95);
        }

        .resource-emoji {
            font-size: 24px;
            margin-bottom: 4px;
            display: block;
        }

        .resource-name {
            font-size: 10px;
            font-weight: 700;
            color: #2d3748;
        }

        /* Hot Badge */
        .hot {
            position: relative;
        }

        .hot::after {
            content: "🔥";
            position: absolute;
            top: -4px;
            right: 4px;
            font-size: 8px;
            animation: pulse 1s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.9; }
        }

        /* Checkbox Container */
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 12px 0 12px;
            animation: slideUp 0.4s ease 0.35s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .checkbox-wrapper input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #25D366;
        }

        .checkbox-wrapper label {
            font-size: 11px;
            color: #4a5568;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
        }

        /* WhatsApp Button */
        .whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: white;
            padding: 10px 16px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            transition: all 0.25s ease;
            border: none;
            cursor: pointer;
            width: 100%;
            animation: btnGlow 2s ease infinite 0.4s both;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2);
        }

        @keyframes btnGlow {
            0%, 100% {
                box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2);
            }
            50% {
                box-shadow: 0 6px 18px rgba(37, 211, 102, 0.35);
            }
        }

        .whatsapp:hover {
            transform: scale(0.98);
            gap: 10px;
        }

        .whatsapp:active {
            transform: scale(0.96);
        }

        .whatsapp svg {
            width: 16px;
            height: 16px;
        }

        /* Exit Animation */
        .dialog-exit {
            animation: floatOut 0.25s ease forwards !important;
        }

        @keyframes floatOut {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(0.85) translateY(15px);
            }
        }
    </style>
</head>
<body>
    <div class="dialog" id="dialog">
        <button class="close" onclick="closeDialog()">✕</button>

        <!-- App Name -->
        <div class="app-name">📚 JKBose Helper</div>
        <div class="tagline">Your Complete Study Companion</div>

        <!-- Resources Grid -->
        <div class="resources">
            <div class="resource-item" onclick="openFeature('notes')">
                <span class="resource-emoji">📝</span>
                <div class="resource-name">Notes</div>
            </div>
            <div class="resource-item hot" onclick="openFeature('pyqs')">
                <span class="resource-emoji">📄</span>
                <div class="resource-name">PYQs</div>
            </div>
            <div class="resource-item" onclick="openFeature('guess')">
                <span class="resource-emoji">🎯</span>
                <div class="resource-name">Guess</div>
            </div>
            <div class="resource-item" onclick="openFeature('important')">
                <span class="resource-emoji">⭐</span>
                <div class="resource-name">Important</div>
            </div>
            <div class="resource-item" onclick="openFeature('books')">
                <span class="resource-emoji">📖</span>
                <div class="resource-name">Books</div>
            </div>
            <div class="resource-item" onclick="openFeature('syllabus')">
                <span class="resource-emoji">📋</span>
                <div class="resource-name">Syllabus</div>
            </div>
        </div>

        <!-- Don't Show Again Checkbox -->
        <div class="checkbox-wrapper">
            <input type="checkbox" id="dontShow">
            <label for="dontShow">Don't show again</label>
        </div>

        <!-- WhatsApp Button -->
        <button class="whatsapp" onclick="joinWhatsApp()">
            <svg viewBox="0 0 24 24" fill="white">
                <path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91C2.13 13.66 2.59 15.36 3.45 16.86L2.05 22L7.3 20.62C8.75 21.41 10.38 21.83 12.04 21.83C17.5 21.83 21.95 17.38 21.95 11.92C21.95 6.46 17.5 2 12.04 2Z"/>
            </svg>
            Join WhatsApp Community
        </button>
    </div>

    <script>
        function closeDialog() {
            const dialog = document.getElementById('dialog');
            const dontShow = document.getElementById('dontShow');
            
            // If checkbox is checked, save to localStorage
            if (dontShow && dontShow.checked) {
                localStorage.setItem('dontShowDialog', 'true');
                // Notify Android if available
                if (window.Android && window.Android.dontShowAgain) {
                    window.Android.dontShowAgain();
                }
            }
            
            dialog.classList.add('dialog-exit');
            setTimeout(() => {
                dialog.style.display = 'none';
            }, 250);
        }

        function openFeature(feature) {
            // Add haptic feedback animation
            const clickedItem = event.currentTarget;
            clickedItem.style.transform = 'scale(0.95)';
            setTimeout(() => {
                clickedItem.style.transform = '';
            }, 150);
            
            if (window.Android && window.Android.openFeature) {
                window.Android.openFeature(feature);
            }
        }

        function joinWhatsApp() {
            const btn = document.querySelector('.whatsapp');
            btn.style.transform = 'scale(0.96)';
            setTimeout(() => {
                btn.style.transform = '';
            }, 150);
            
            const whatsappUrl = 'https://whatsapp.com/channel/0029VajKhZ0JENy2l6mBt817';
            
            if (window.Android && window.Android.openUrl) {
                window.Android.openUrl(whatsappUrl);
            } else {
                window.open(whatsappUrl, '_blank');
            }
        }

        // Check if dialog should be shown
        if (localStorage.getItem('dontShowDialog') === 'true') {
            document.getElementById('dialog').style.display = 'none';
        }
    </script>
</body>
</html>
