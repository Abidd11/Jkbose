<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Join WhatsApp Channel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #075E54 0%, #128C7E 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        /* Main Card */
        .card {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 40px 24px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.6s cubic-bezier(0.21, 1.11, 0.35, 1.02);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.4);
        }

        /* Slide Up Animation */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* WhatsApp Icon */
        .whatsapp-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: pulse 2s infinite;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 15px 35px rgba(37, 211, 102, 0.5);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
            }
        }

        .whatsapp-icon svg {
            width: 45px;
            height: 45px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-5px);
            }
        }

        /* Title */
        h2 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #075E54 0%, #128C7E 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            animation: fadeIn 0.8s ease 0.2s both;
        }

        /* Subtitle */
        .subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 8px;
            animation: fadeIn 0.8s ease 0.3s both;
        }

        .highlight {
            font-size: 14px;
            color: #25D366;
            font-weight: 600;
            margin-bottom: 24px;
            animation: fadeIn 0.8s ease 0.4s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Features List */
        .features {
            text-align: left;
            margin: 24px 0;
            padding: 0 8px;
            animation: fadeIn 0.8s ease 0.5s both;
        }

        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            animation: slideInLeft 0.5s ease backwards;
        }

        .feature-item:nth-child(1) { animation-delay: 0.5s; }
        .feature-item:nth-child(2) { animation-delay: 0.6s; }
        .feature-item:nth-child(3) { animation-delay: 0.7s; }
        .feature-item:nth-child(4) { animation-delay: 0.8s; }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .feature-check {
            width: 24px;
            height: 24px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .feature-check svg {
            width: 14px;
            height: 14px;
        }

        .feature-text {
            font-size: 14px;
            color: #333;
            line-height: 1.4;
        }

        /* Join Button */
        .join-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: white;
            padding: 16px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 700;
            margin-top: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(37, 211, 102, 0.4);
            animation: fadeInUp 0.8s ease 0.9s both;
            width: 100%;
            max-width: 280px;
            border: none;
            cursor: pointer;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .join-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(37, 211, 102, 0.6);
            gap: 16px;
        }

        .join-btn:active {
            transform: scale(0.98);
        }

        .join-btn svg {
            width: 22px;
            height: 22px;
            transition: transform 0.3s ease;
        }

        .join-btn:hover svg {
            transform: translateX(3px);
        }

        /* Close Button (optional) */
        .close-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(0, 0, 0, 0.2);
            transform: rotate(90deg);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card {
                padding: 32px 20px;
            }
            
            h2 {
                font-size: 24px;
            }
            
            .join-btn {
                padding: 14px 28px;
                font-size: 16px;
            }
        }
    </style>
</head>
