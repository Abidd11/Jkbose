<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JKBose Daily Inspiration</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            padding: 16px;
            overflow: hidden;
        }

        /* Modern Asymmetric Bubble Container */
        .dialog {
            max-width: 320px;
            width: 100%;
            background: #ffffff;
            border-radius: 40px 40px 8px 40px;
            padding: 28px 24px 20px 24px;
            position: relative;
            box-shadow: 0 30px 70px -10px rgba(37, 211, 102, 0.25);
            border: 4px solid #25D366;
            text-align: center;
            transform-origin: bottom left;
            animation: popIn 0.6s cubic-bezier(0.34, 1.76, 0.64, 1) forwards;
            transition: all 0.3s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0.5) rotate(-8deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .dialog.exit-animation {
            animation: popOut 0.3s cubic-bezier(0.36, -0.07, 0.57, -0.2) forwards;
        }

        @keyframes popOut {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.7) translateY(30px); opacity: 0; }
        }

        /* Floating Mascot Accent Box */
        .avatar-container {
            width: 86px;
            height: 86px;
            margin: -58px auto 14px;
            position: relative;
            background: #25D366;
            border-radius: 30px;
            padding: 4px;
            box-shadow: 0 12px 24px -6px rgba(37, 211, 102, 0.4);
            animation: gentleSwing 4s ease-in-out infinite;
        }

        @keyframes gentleSwing {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-5px) rotate(3deg); }
        }

        .teddy-bear {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #ffffff;
            border-radius: 26px;
        }

        /* Header Pill Badge */
        .heart-badge {
            font-size: 13px;
            font-weight: 800;
            color: #ffffff;
            background: linear-gradient(135deg, #25D366 0%, #1EBEA5 100%);
            padding: 6px 18px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
        }

        /* Quote Canvas Box */
        .quote-canvas {
            background: #F8FAFC;
            border-radius: 24px;
            padding: 22px 18px;
            margin-bottom: 20px;
            border: 1px dashed #CBD5E1;
            position: relative;
        }

        .quote-title {
            font-size: 13px;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            letter-spacing: 0.2px;
        }

        .quote-title .accent-dot {
            width: 6px;
            height: 6px;
            background: #25D366;
            border-radius: 50%;
        }

        .quote-mark {
            font-size: 22px;
            line-height: 1;
            color: #25D366;
            font-family: Georgia, serif;
            display: block;
            margin-bottom: -4px;
        }

        .quote-content {
            font-size: 13.5px;
            color: #1e293b;
            line-height: 1.65;
            font-weight: 700;
            font-style: italic;
            max-height: 140px;
            overflow-y: auto;
            padding: 0 4px;
            text-align: center;
        }

        .quote-content::-webkit-scrollbar {
            width: 4px;
        }
        .quote-content::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 10px;
        }

        /* High Contrast Primary CTA Button */
        .action-btn { 
            background: #0f172a;
            color: #ffffff; 
            padding: 16px 20px; 
            border-radius: 20px; 
            border: none; 
            font-size: 14px; 
            font-weight: 800; 
            width: 100%; 
            cursor: pointer; 
            margin-bottom: 14px;
            letter-spacing: 0.3px;
            box-shadow: 0 10px 25px -6px rgba(15, 23, 42, 0.3);
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .action-btn:hover {
            background: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 14px 28px -4px rgba(15, 23, 42, 0.4);
        }

        .action-btn:active { 
            transform: translateY(1px);
        }

        /* Circular Checkbox Controls */
        .checkbox-wrapper { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            margin-bottom: 12px;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 14px;
            transition: background 0.2s;
            user-select: none;
        }

        .checkbox-wrapper:hover { background: #F1F5F9; }

        .checkbox-wrapper input { 
            width: 16px; 
            height: 16px; 
            cursor: pointer; 
            accent-color: #0f172a; 
            border: 2px solid #94a3b8;
            border-radius: 50%;
        }

        .checkbox-wrapper label { 
            font-size: 11px; 
            color: #64748b; 
            font-weight: 700; 
            cursor: pointer; 
        }

        .close-btn { 
            background: transparent; 
            color: #94a3b8; 
            padding: 4px; 
            border: none; 
            font-size: 12px; 
            font-weight: 700; 
            width: max-content;
            margin: 0 auto;
            cursor: pointer; 
            display: block;
            transition: color 0.2s;
        }

        .close-btn:hover { color: #475569; }
    </style>
</head>
<body>
    <div class="dialog" id="dialog">
        <!-- Floating Mascot Wrap -->
        <div class="avatar-container">
            <img src="https://media.tenor.com/-aW73OVUtyYAAAAi/tkthao219-bubududu.gif" alt="Mascot" class="teddy-bear">

        <!-- Header Pill Badge -->
        <div class="heart-badge">Daily Inspiration 📚</div>
        
        <!-- Quote Display Box -->
        <div class="quote-canvas">

        // Inject random quote on open
        document.getElementById('quote').innerText = quotes[Math.floor(Math.random() * quotes.length)];

        function toggleCheckbox(e) {
            const checkbox = document.getElementById('dontShow');
            checkbox.checked = !checkbox.checked;
        }

        function handleClose() { 
            const dialog = document.getElementById('dialog');
            if (document.getElementById('dontShow').checked) {
                localStorage.setItem('dontShowAsymmetricQuoteDialog', 'true');
            }
            
            dialog.classList.add('exit-animation');
            setTimeout(() => {
                dialog.style.display = 'none';
            }, 300);
        }

        function joinChannel() { 
            window.open('https://whatsapp.com/channel/0029VajKhZ0JENy2l6mBt817', '_blank'); 
            handleClose();
        }

        if (localStorage.getItem('dontShowAsymmetricQuoteDialog') === 'true') {
            document.getElementById('dialog').style.display = 'none';
        }
    </script>
</body>
</html>
