<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JKBose Updates</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 16px;
            overflow: hidden;
        }

        /* Premium Glassmorphic Dialog Panel */
        .dialog {
            max-width: 310px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px;
            position: relative;
            box-shadow: 0 25px 60px -15px rgba(100, 110, 160, 0.35);
            border: 3px solid #C5CAE8;
            text-align: center;
            transform-origin: center;
            animation: springIn 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transition: all 0.3s ease;
        }

        @keyframes springIn {
            0% { transform: scale(0.6) translateY(40px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .dialog.exit-animation {
            animation: bounceOut 0.35s cubic-bezier(0.36, -0.07, 0.57, -0.2) forwards;
        }

        @keyframes bounceOut {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.75) translateY(20px); opacity: 0; }
        }

        /* Continuous playful floating animation */
        .avatar-container {
            width: 84px;
            height: 84px;
            margin: -48px auto 10px;
            position: relative;
            background: #ffffff;
            border-radius: 50%;
            padding: 2px;
            box-shadow: 0 10px 20px -5px rgba(100, 110, 160, 0.2);
            border: 3px solid #C5CAE8;
            animation: teddyFloat 3s ease-in-out infinite;
        }

        @keyframes teddyFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .teddy-bear {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
        }

        .student-greeting {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #6366f1;
            margin-bottom: 14px;
            display: inline-block;
            background: #EEF2FF;
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* Beautiful Information Box */
        .update-box {
            background: linear-gradient(145deg, #F0F2FA 0%, #C5CAE8 150%);
            padding: 16px 14px;
            border-radius: 24px;
            margin-bottom: 14px;
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.9), 0 4px 12px rgba(197, 202, 232, 0.25);
            border-left: 5px solid #8B94D6;
        }

        .update-list {
            list-style: none;
            text-align: left;
            display: inline-block;
            margin: 0 auto;
        }

        .update-item {
            font-size: 13.5px; 
            color: #2d3748; 
            line-height: 1.8; 
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .update-item span {
            font-size: 15px;
        }

        /* Dynamic Micro Tip Card */
        .tip-card {
            font-size: 11px;
            font-weight: 600;
            color: #4b5563;
            background: #f9fafb;
            border: 1px dashed #d1d5db;
            padding: 10px 12px;
            border-radius: 16px;
            margin-bottom: 18px;
            text-align: left;
        }
        
        .tip-title {
            font-weight: 800;
            color: #1f2937;
            font-size: 11.5px;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Modernized Interactive Conversion CTA Button */
        .action-btn { 
            background: linear-gradient(135deg, #25D366 0%, #1EBEA5 100%);
            color: white; 
            padding: 14px 20px; 
            border-radius: 20px; 
            border: none; 
            font-size: 14px; 
            font-weight: 800; 
            width: 100%; 
            cursor: pointer; 
            margin-bottom: 14px;
            letter-spacing: 0.2px;
            box-shadow: 0 10px 25px -5px rgba(37, 211, 102, 0.45);
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px -4px rgba(37, 211, 102, 0.55);
        }

        .action-btn:active { 
            transform: translateY(1px);
            box-shadow: 0 6px 15px -4px rgba(37, 211, 102, 0.4);
        }

        /* Centered Interactive Checkbox Component */
        .checkbox-wrapper { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            margin-bottom: 14px;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 12px;
            transition: background 0.2s;
            user-select: none;
        }

        .checkbox-wrapper:hover { background: #F4F5FA; }

        .checkbox-wrapper input { 
            width: 16px; 
            height: 16px; 
            cursor: pointer; 
            accent-color: #25D366; 
            border: 2px solid #A0AEC0;
            border-radius: 4px;
        }

        .checkbox-wrapper label { 
            font-size: 11px; 
            color: #718096; 
            font-weight: 700; 
            cursor: pointer; 
        }

        .close-btn { 
            background: transparent; 
            color: #A0AEC0; 
            padding: 6px; 
            border: none; 
            font-size: 12px; 
            font-weight: 700; 
            width: max-content;
            margin: 0 auto;
            cursor: pointer; 
            display: block;
            transition: color 0.2s;
        }

        .close-btn:hover { color: #718096; }
    </style>
</head>
<body>
    <div class="dialog" id="dialog">
        <!-- Floating Avatar Wrap -->
        <div class="avatar-container">
            <img src="https://media.tenor.com/63IENW605s0AAAAj/dudu-twisting-dance.gif" alt="Teddy Bear" class="teddy-bear">
        </div>
        
        <!-- Interactive Student Greeting Header -->
        <div class="student-greeting" id="greetingText">Hey Student! ✨</div>
        
        <!-- UI optimized Layout Content Grid -->
        <div class="update-box">
            <ul class="update-list">
                <li class="update-item"><span>📚</span> All Class Guess Papers</li>
                <li class="update-item"><span>📰</span> Educational News</li>
                <li class="update-item"><span>🚀</span> Fast Academic Updates</li>
            </ul>
        </div>

        <!-- Dynamic Micro Study Tip Box -->
        <div class="tip-card">
            <div class="tip-title">⚡ Quick Study Tip:</div>
            <div id="study-tip">Loading focus fuel...</div>
        </div>

        <!-- CTA conversion layer -->
        <button class="action-btn" onclick="joinWhatsApp()">Join WhatsApp Now</button>
        
        <!-- Safe Interactive Controls Area -->
        <div class="checkbox-wrapper" onclick="toggleCheckbox(event)">
            <input type="checkbox" id="dontShow" onclick="event.stopPropagation();">
            <label for="dontShow">Don't show again</label>
        </div>

        <button class="close-btn" onclick="handleClose()">Dismiss</button>
    </div>

    <script>
        // Dynamically change greeting message based on time of day
        function setDynamicGreeting() {
            const hour = new Date().getHours();
            const greetingEl = document.getElementById('greetingText');
            if (hour < 12) greetingEl.innerHTML = "🌅 Good Morning, Achiever!";
            else if (hour < 17) greetingEl.innerHTML = "☀️ Good Afternoon, Scholar!";
            else greetingEl.innerHTML = "🌙 Good Evening, Thinker!";
        }
        setDynamicGreeting();

        // High-value quick student focus tips
        const studyTips = [
            "Try the Pomodoro trick: Study hard for 25 mins, then take a 5-min break!",
            "Explain what you just read to an imaginary friend to remember it 2x faster.",
            "Keep a blank sheet nearby to scribble distracting thoughts down.",
            "Review your hardest formulas right before sleeping—your brain preserves it better!",
            "Hydrate! Just one glass of water can boost your brain's processing speed."
        ];
        document.getElementById('study-tip').innerText = studyTips[Math.floor(Math.random() * studyTips.length)];

        function toggleCheckbox(e) {
            const checkbox = document.getElementById('dontShow');
            checkbox.checked = !checkbox.checked;
        }

        function handleClose() { 
            const dialog = document.getElementById('dialog');
            if (document.getElementById('dontShow').checked) {
                localStorage.setItem('dontShowDialog', 'true');
            }
            
            dialog.classList.add('exit-animation');
            setTimeout(() => {
                dialog.style.display = 'none';
            }, 320);
        }
        
        function joinWhatsApp() { 
            window.open('https://chat.whatsapp.com/Gvx7OvnZMAILbiYdAwM1wg', '_blank'); 
        }

        if (localStorage.getItem('dontShowDialog') === 'true') {
            document.getElementById('dialog').style.display = 'none';
        }
    </script>
</body>
</html>
