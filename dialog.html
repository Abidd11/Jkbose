<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Channel</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        .toast {
            background: white;
            border-radius: 16px;
            padding: 16px 20px;
            max-width: 280px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            animation: slideUp 0.3s ease;
            position: relative;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .close {
            position: absolute;
            top: 8px;
            right: 12px;
            font-size: 18px;
            cursor: pointer;
            color: #999;
        }
        
        .close:hover { color: #666; }
        
        .icon {
            font-size: 32px;
            margin-bottom: 4px;
        }
        
        h4 {
            font-size: 16px;
            color: #075E54;
            margin: 0 0 4px 0;
        }
        
        p {
            font-size: 12px;
            color: #666;
            margin: 0 0 12px 0;
        }
        
        .btn {
            display: block;
            background: #25D366;
            color: white;
            padding: 8px 16px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .btn:hover {
            background: #128C7E;
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="toast">
        <div class="close" onclick="this.parentElement.style.display='none'">×</div>
        <div class="icon">💬</div>
        <h4>Join WhatsApp Channel</h4>
        <p>Get updates & study materials</p>
        <a href="https://whatsapp.com/channel/0029VajKhZ0JENy2l6mBt817" class="btn" target="_blank">Join Now →</a>
    </div>
</body>
</html>
